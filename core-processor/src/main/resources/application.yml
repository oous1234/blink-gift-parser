spring:
  application:
    name: core-processor
  data:
    mongodb:
      uri: mongodb://localhost:27017/main
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
  cloud:
    openfeign:
      okhttp:
        enabled: true
      httpclient:
        enabled: false

server:
  port: 7779
  error:
    include-stacktrace: always

logging:
  level:
    root: INFO
    com.ceawse.coreprocessor: DEBUG
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
    org.springframework.web: INFO
    org.apache.coyote: INFO